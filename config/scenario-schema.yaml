# 场景配置 YAML Schema
# Step1 默认按本文件生成 Excel 骨架；上传 .xlsx 可覆盖列结构

scenario_name: default-knowledge-extraction
display_name: 通用知识萃取结构
domain: 通用
version: "v1.1"
auto_generate_id: true

scenario:
  business_boundary: ""
  target_users: []
  decision_types: []

categories:
  - 判断规则
  - 操作流程
  - 反模式

# 知识列（锚定四列"场景/场景说明/子场景/子场景说明"由系统固定，不在此列出）
fields:
  - name: 环节
    type: 文本
    required: false
    fill_rule: 业务流程环节或步骤名称
    example: 客户准入
  - name: 访谈方向
    type: 文本
    required: false
    fill_rule: 专家访谈聚焦点
    example: 风险识别口径
  - name: 具体方法
    type: 长文本
    required: true
    fill_rule: 可执行的方法、规则或操作要点
    example: 需同时核验征信与流水
  - name: 知识类型
    type: 枚举
    required: false
    fill_rule: 与 categories 对齐
    example: 判断规则
    enum_values:
      - 判断规则
      - 操作流程
      - 反模式
  - name: 知识引用
    type: 文本
    required: false
    fill_rule: 制度/手册出处
    example: 《信贷管理办法》第3章
  - name: 适用条件
    type: 长文本
    required: false
    fill_rule: 何时适用本条知识
    example: 新客户首次授信
  - name: 判断逻辑
    type: 长文本
    required: false
    fill_rule: 判断链路与分支
    example: 评级A且现金流稳定则通过
  - name: 反模式/踩坑提示
    type: 长文本
    required: false
    fill_rule: 常见错误与禁忌
    example: 仅看抵押物不看现金流
  # L2 隐性上下文列（Step3 隐性注释回填）
  - name: 经验判断
    type: 长文本
    required: false
    fill_rule: 专家经验判断及理由
    example: 芯片设计企业轻资产，不能只看抵押物
  - name: 适用边界
    type: 长文本
    required: false
    fill_rule: 什么情况下本规则不适用
    example: 创始人来自中科院或985高校的芯片企业可放宽年限
  - name: 例外情形
    type: 长文本
    required: false
    fill_rule: 已被实际突破的场景
    example: 2024年X企业实际控制人变更但业务稳定性高
  # L3 证据层
  - name: 来源文档
    type: 文本
    required: false
    fill_rule: 知识来源文件/制度名称
    example: 《科技企业普惠贷款业务操作指引》
  - name: 来源位置
    type: 文本
    required: false
    fill_rule: 知识在来源中的具体位置
    example: 第2章 3.1.2
  - name: 置信度
    type: 枚举
    required: false
    fill_rule: 知识置信度
    example: 高
    enum_values: ["高", "中", "低"]
  - name: 贡献专家
    type: 文本
    required: false
    fill_rule: 贡献该知识的专家姓名/工号
    example: 张三
  - name: 证据数
    type: 整数
    required: false
    fill_rule: 支撑该知识的案例数量
    example: 3
  - name: 突破数
    type: 整数
    required: false
    fill_rule: 专家实践中突破该规则的次数
    example: 1

interview:
  methods:
    - 案例反推法
    - 对比追问法
    - 极限假设法
  min_sessions: 3
  session_duration_minutes: 60
  required_experts: 2

quality:
  # target_per_pipeline: 单次流水线的合理目标
  target_per_pipeline: 30
  # library_target: 知识库建设目标（长期）
  library_target: 800
  min_confidence_level: 中
  source_annotation_rate: 0.60
  anti_pattern_ratio: 0.10
  skill_score_threshold: 75

compilation:
  output_format: SKILL.md
  include_anti_patterns_section: true
  include_usage_examples: true
